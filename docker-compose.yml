services:
  api:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=${APP_ENV:-development}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_SESSION_TOKEN=${AWS_SESSION_TOKEN}
      - AWS_REGION=${AWS_REGION:-ap-south-1}
      - BEDROCK_MODEL_ID=${BEDROCK_MODEL_ID:-us.anthropic.claude-haiku-4-5-20251001-v1:0}
      - DATABASE_PATH=/app/db/sieve.db
      - JOBS_STORAGE_DIR=/app/data/jobs
      - RECRUITER_EMAIL=${RECRUITER_EMAIL:-recruiter@seclore.com}
      - RECRUITER_PASSWORD=${RECRUITER_PASSWORD:-seclore123}
      - SCREENING_LINK_TTL_MINUTES=${SCREENING_LINK_TTL_MINUTES:-15}
      - FRONTEND_BASE_URL=${FRONTEND_BASE_URL:-http://localhost:3000}
      - MAX_PROFILE_FOLLOWUPS=${MAX_PROFILE_FOLLOWUPS:-2}
      - MAX_SECLORE_QA_TURNS=${MAX_SECLORE_QA_TURNS:-5}
      - KNOWLEDGE_BASE_DIR=/app/data/knowledge_base
      - RAG_TOP_K=${RAG_TOP_K:-3}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000}
    volumes:
      - ./backend/app:/app/app
      - ./backend/scripts:/app/scripts
      - ./backend/db:/app/db
      - ./data:/app/data
    restart: unless-stopped

  web:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    depends_on:
      - api
    restart: unless-stopped
